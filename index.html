<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTL x MRMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-mark">
      <span class="login-mark-bracket">[</span>MRMS<span class="login-mark-bracket">]</span>
    </div>
    <p class="login-sub">BTL Material Request Management System</p>

    <form id="loginForm" class="login-form">
      <label class="field">
        <span class="field-label">User ID</span>
        <input type="text" id="loginUserId" placeholder="e.g. 17004327" autocomplete="username" required>
      </label>
      <label class="field">
        <span class="field-label">PIN</span>
        <input type="password" id="loginPin" placeholder="Enter PIN" inputmode="numeric" autocomplete="current-password" required>
      </label>
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Log In</button>
      <p class="login-error" id="loginError"></p>
      <div class="login-help">
        <button type="button" class="link-btn" id="forgotPinBtn">Forgot PIN?</button>
        <span class="login-hint">First time? Use your User ID as PIN</span>
      </div>
    </form>
  </div>
  <button class="theme-toggle theme-toggle-login" id="themeToggleLogin" aria-label="Toggle theme">
    <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>
  </button>
</div>

<!-- ============ APP SHELL ============ -->
<div id="appShell" class="app-shell hidden">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="sidebar-mark">
        <span class="login-mark-bracket">[</span>MRMS<span class="login-mark-bracket">]</span>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebarNav"><!-- populated by JS based on role --></nav>

    <div class="sidebar-bottom">
      <button class="theme-toggle" id="themeToggleApp" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>
        <span class="nav-label">Theme</span>
      </button>
      <button class="sidebar-user" id="logoutBtn">
        <span class="user-avatar" id="userAvatar">--</span>
        <span class="user-meta">
          <span class="user-name" id="userName">—</span>
          <span class="user-role" id="userRole">—</span>
        </span>
        <svg class="logout-icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="globalSearch" placeholder="Search requests, shop ID, materials...">
      </div>
      <div class="topbar-actions">
        <span class="sync-indicator" id="syncIndicator" title="Live sync status">
          <span class="sync-dot"></span> <span id="syncText">Synced</span>
        </span>
        <button class="icon-btn" id="notifBtn" aria-label="Notifications">
          <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
          <span class="notif-badge hidden" id="notifBadge">0</span>
        </button>
      </div>
    </header>

    <div class="notif-panel hidden" id="notifPanel">
      <div class="notif-panel-header">Notifications</div>
      <div id="notifList" class="notif-list"><p class="empty-state">No notifications yet.</p></div>
    </div>

    <section class="content" id="content">
      <!-- page views render here via JS -->
    </section>
  </main>
</div>

<!-- ============ GENERIC MODAL ============ -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle"></h2>
      <button class="icon-btn" id="modalCloseBtn" aria-label="Close">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ============ TOASTS ============ -->
<div class="toast-stack" id="toastStack"></div>

<script src="config.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>
</body>
</html>
